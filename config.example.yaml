server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 10s
  write_timeout: 30s
  cors:
    allowed_origins: ["http://localhost:5173"]
    allowed_methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]

database:
  url: "postgres://stoa:secret@localhost:5432/stoa?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

auth:
  jwt_secret: "change-me-in-production"
  access_token_ttl: 15m
  refresh_token_ttl: 168h  # 7 days

media:
  storage: "local"         # "local" or "s3"
  local_path: "./uploads"
  s3:
    bucket: ""
    region: ""
    endpoint: ""           # For MinIO

search:
  engine: "postgres"       # "postgres", or via plugin

i18n:
  default_locale: "de-DE"
  available_locales: ["de-DE", "en-US"]

security:
  rate_limit:
    requests_per_minute: 300
    burst: 50
  bcrypt_cost: 12

payment:
  encryption_key: ""   # 32-byte key or 64-char hex (Env: STOA_PAYMENT_ENCRYPTION_KEY)

# MCP Server Configuration (for stoa-store-mcp and stoa-admin-mcp binaries)
# Configured via environment variables:
#   STOA_MCP_API_URL   - Stoa API base URL (default: http://localhost:8080)
#   STOA_MCP_API_KEY   - API key for authentication
#   STOA_MCP_PORT      - SSE server port (default: 8090)
#   STOA_MCP_BASE_URL  - Public base URL for SSE endpoint (default: http://localhost:{port})
