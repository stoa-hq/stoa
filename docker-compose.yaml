services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stoa
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: stoa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stoa"]
      interval: 5s
      timeout: 5s
      retries: 5

  stoa:
    build:
      context: .
      args:
        PLUGINS: "${STOA_PLUGINS:-}"
    ports:
      - "8080:8080"
    environment:
      STOA_DATABASE_URL: "postgres://stoa:secret@postgres:5432/stoa?sslmode=disable"
      STOA_AUTH_JWT_SECRET: "change-me-in-production"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  stoa-store-mcp:
    build:
      context: .
      args:
        PLUGINS: "${STOA_PLUGINS:-}"
    ports:
      - "8090:8090"
    environment:
      STOA_MCP_API_URL: "http://stoa:8080"
      STOA_MCP_API_KEY: "${STOA_MCP_API_KEY:-}"
      STOA_MCP_PORT: "8090"
    depends_on:
      stoa:
        condition: service_started
    entrypoint: ["./stoa-store-mcp"]
    command: []

  stoa-admin-mcp:
    build:
      context: .
      args:
        PLUGINS: "${STOA_PLUGINS:-}"
    ports:
      - "8091:8091"
    environment:
      STOA_MCP_API_URL: "http://stoa:8080"
      STOA_MCP_API_KEY: "${STOA_MCP_API_KEY:-}"
      STOA_MCP_PORT: "8091"
    depends_on:
      stoa:
        condition: service_started
    entrypoint: ["./stoa-admin-mcp"]
    command: []

volumes:
  pgdata:
  uploads:
